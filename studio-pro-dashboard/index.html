<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Pro Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header>
            <div class="header-content">
                <div class="brand">
                    <span class="logo-icon">S</span>
                    <h1>Studio Pro</h1>
                </div>
                <div id="userInfo" class="user-info">
                    <span id="userName">載入中...</span>
                </div>
            </div>
        </header>

        <!-- Navigation Tabs -->
        <nav class="tabs">
            <button class="tab-link active" data-tab="customers">客戶資料管理工具</button>
            <button class="tab-link" data-tab="settings" disabled>其他工具 (TBD)</button>
        </nav>

        <!-- Main Content -->
        <main>
            <!-- Customers Tab -->
            <section id="customers" class="tab-content active">
                <div class="section-header">
                    <h2>客戶資料清單</h2>
                    <button id="addCustomerBtn" class="primary-btn">+ 新增客戶</button>
                </div>

                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="搜尋公司、統編或聯絡人...">
                </div>

                <div class="grid-container">
                    <table id="customerTable">
                        <thead>
                            <tr>
                                <th data-col="companyName" style="width: 200px;">公司名稱<div class="resizer"></div></th>
                                <th data-col="taxId" style="width: 100px;">統編<div class="resizer"></div></th>
                                <th data-col="contact" style="width: 100px;">聯絡人<div class="resizer"></div></th>
                                <th data-col="nickname" style="width: 100px;">客戶簡稱<div class="resizer"></div></th>
                                <th data-col="phone" style="width: 120px;">聯絡電話<div class="resizer"></div></th>
                                <th data-col="email" style="width: 180px;">電子信箱<div class="resizer"></div></th>
                                <th data-col="address" style="width: 250px;">地址<div class="resizer"></div></th>
                                <th data-col="invoiceInfo" style="width: 150px;">電子發票<div class="resizer"></div></th>
                            </tr>
                        </thead>
                        <tbody id="customerTableBody">
                            <!-- Rows will be injected by JavaScript -->
                        </tbody>
                    </table>
                    <div id="tableLoading" class="loading-state">
                        <span>讀取資料中...</span>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Modals (Align with current fields) -->
    <div id="modalOverlay" class="modal-overlay">
        <div class="modal-card">
            <div class="modal-header">
                <h3 id="modalTitle">新增資料</h3>
                <button id="closeModal" style="background:none; border:none; font-size:1.5rem; cursor:pointer;">&times;</button>
            </div>
            <form id="customerForm">
                <input type="hidden" id="rowIndex">
                <div class="form-group">
                    <label>公司名稱</label>
                    <input type="text" id="companyName" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>統編</label>
                        <input type="text" id="taxId">
                    </div>
                    <div class="form-group">
                        <label>聯絡人</label>
                        <input type="text" id="contact">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>客戶簡稱</label>
                        <input type="text" id="nickname">
                    </div>
                    <div class="form-group">
                        <label>聯絡電話</label>
                        <input type="tel" id="phone">
                    </div>
                </div>
                <div class="form-group">
                    <label>電子信箱</label>
                    <input type="email" id="email">
                </div>
                <div class="form-group">
                    <label>地址</label>
                    <input type="text" id="address">
                </div>
                <div class="form-group">
                    <label>電子發票資訊</label>
                    <input type="text" id="invoiceInfo">
                </div>
                <div class="form-actions">
                    <button type="submit" class="save-btn">儲存資料</button>
                    <button type="button" id="deleteBtn" style="width: 100%; background:#fee2e2; color:#dc2626; border:none; padding:0.75rem; border-radius:8px; font-weight:600; cursor:pointer; margin-top:0.5rem; display:none;">刪除此筆資料</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
